# Android 릴리즈 빌드 자동화
#
# 트리거: v로 시작하는 태그 push (예: v1.0.0) 또는 수동 실행
# 결과물: 서명된 AAB(스토어 업로드용) + APK(직접 설치 테스트용) 아티팩트
#
# ★ 사전 준비 (docs/03-android-release.md 참고):
#   Settings > Secrets and variables > Actions 에 등록:
#   - Secrets: KEYSTORE_BASE64(=base64 upload-keystore.jks), STORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS
#   - Variables: API_URL(=https://<railway>/api/v1), GOOGLE_CLIENT_ID
#   (API_URL 미설정 시 앱이 localhost 를 바라봐 프로덕션에서 동작하지 않습니다)
name: Android Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.6
          cache: true

      - name: 서명 키 복원 (Secrets -> 파일)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: 의존성 설치
        run: flutter pub get

      - name: 정적 분석
        run: flutter analyze

      - name: 테스트
        run: flutter test

      - name: AAB 빌드 (Play 스토어 업로드용)
        run: >
          flutter build appbundle --release
          --dart-define=API_URL=${{ vars.API_URL }}
          --dart-define=GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}

      - name: APK 빌드 (직접 설치 테스트용)
        run: >
          flutter build apk --release
          --dart-define=API_URL=${{ vars.API_URL }}
          --dart-define=GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}

      - name: AAB 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: sangsang-aab
          path: frontend/mobile/build/app/outputs/bundle/release/app-release.aab

      - name: APK 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: sangsang-apk
          path: frontend/mobile/build/app/outputs/flutter-apk/app-release.apk

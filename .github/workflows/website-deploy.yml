# 마케팅/법적고지 웹사이트 자동 배포 (GitHub Pages)
#
# website/ 폴더가 변경되어 main에 push되면 자동으로 배포됩니다.
# 배포 URL: https://leeeo.github.io/sangsang/
# ★ 사전 준비: 저장소 Settings > Pages > Source 를 "GitHub Actions"로 설정
#   (docs/02-website-deploy-pages.md 참고)
name: Deploy Website

on:
  push:
    branches: [main]
    paths: ['website/**', '.github/workflows/website-deploy.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run migrations
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: poetry run alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: poetry run pytest --tb=short -q

  admin-build:
    name: Admin Dashboard Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/admin-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build

  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
